<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceBuddy | Панель управління</title>
    <!-- Підключення Tailwind, Chart.js та FontAwesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e5e5e5; }
        .bento-card { border-radius: 28px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); transition: transform 0.2s ease; }
        .bento-card:hover { transform: translateY(-2px); }
        .sidebar { background-color: #f8f9fa; border-top-right-radius: 40px; border-bottom-right-radius: 40px; }
        .bg-orange-brand { background-color: #ff5722; }
        .bg-green-brand { background-color: #1a2e24; }
        
        /* Стилі для кругового прогрес-бару */
        .progress-ring__circle {
            transition: stroke-dashoffset 0.8s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
        
        /* Кастомний скроллбар для транзакцій */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen text-slate-800 p-2 md:p-6 gap-6">

    <!-- Спливаюче сповіщення (Toast) -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 -translate-y-20 opacity-0 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl z-50 transition-all duration-300 flex items-center gap-3 font-medium">
        <i id="toast-icon" class="fas fa-check-circle text-emerald-400"></i>
        <span id="toast-message">Успішно!</span>
    </div>

    <!-- Ліва навігаційна панель (Sidebar) -->
    <aside class="sidebar w-64 p-8 hidden lg:flex flex-col justify-between shadow-xl">
        <div>
            <!-- Логотип та Профіль -->
            <div class="mb-12">
                <h1 class="text-2xl font-bold text-slate-800 mb-8 tracking-tight"><i class="fas fa-wallet text-emerald-600 mr-2"></i>UPFinance<span class="text-xs align-top">®</span></h1>
                <div class="flex items-center gap-4">
                    <img src="https://ui-avatars.com/api/?name=User&background=1a2e24&color=fff" alt="Avatar" class="w-12 h-12 rounded-full shadow-md border-2 border-white">
                    <div>
                        <div class="font-bold text-sm">Користувач</div>
                        <div class="text-xs text-slate-400">finance@buddy.ua</div>
                    </div>
                </div>
            </div>

            <!-- Меню -->
            <nav class="space-y-2">
                <a href="#" class="flex items-center gap-4 bg-green-brand text-white px-5 py-3 rounded-2xl font-medium shadow-md shadow-green-900/20"><i class="fas fa-home w-5 text-center"></i> Головна</a>
                <a href="#" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors"><i class="fas fa-chart-pie w-5 text-center"></i> Статистика</a>
                <a href="#" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors"><i class="fas fa-credit-card w-5 text-center"></i> Платежі</a>
                <a href="#" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100 transition-colors"><i class="fas fa-bullseye w-5 text-center"></i> Цілі</a>
            </nav>
        </div>
        
        <button class="flex items-center gap-4 px-5 py-3 text-slate-400 hover:text-slate-800 transition-colors font-medium"><i class="fas fa-sign-out-alt"></i> Вихід</button>
    </aside>

    <!-- Головна робоча область -->
    <main class="flex-1 max-w-6xl mx-auto w-full flex flex-col gap-6">
        
        <!-- Сітка Bento Grid -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6 h-full">
            
            <!-- 1. Аналітика (Темно-зелена картка) -->
            <div class="bento-card md:col-span-8 bg-green-brand p-8 text-white flex flex-col justify-between relative overflow-hidden">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-2xl font-bold mb-1">Аналітика</h2>
                        <p class="text-emerald-400/80 text-sm">Оптимізуйте свої витрати</p>
                    </div>
                    <div class="text-right">
                        <p class="text-emerald-400/80 text-sm mb-1">Загальні витрати</p>
                        <h3 class="text-2xl font-bold" id="total-expense">₴0.00</h3>
                    </div>
                </div>
                
                <!-- Графік Chart.js -->
                <div class="h-48 w-full relative">
                    <canvas id="analyticsChart"></canvas>
                    <div id="empty-chart-msg" class="absolute inset-0 flex items-center justify-center text-emerald-400/50 text-sm hidden">
                        Додайте витрати для відображення графіка
                    </div>
                </div>
            </div>

            <!-- 2. Останні операції (Світла картка) -->
            <div class="bento-card md:col-span-4 bg-white p-6 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-lg">Операції <i class="fas fa-arrow-right text-sm ml-1"></i></h3>
                    <span class="text-xs text-slate-400 bg-slate-100 px-3 py-1 rounded-full">Усі</span>
                </div>
                
                <!-- Список транзакцій -->
                <div id="transactions-list" class="flex-1 overflow-y-auto max-h-[250px] custom-scrollbar pr-2 space-y-4">
                    <!-- Транзакції генеруються через JS -->
                </div>
            </div>

            <!-- 3. Доступні кошти (Помаранчева картка) -->
            <div class="bento-card md:col-span-4 bg-orange-brand p-8 text-white flex flex-col justify-between items-center text-center relative overflow-hidden">
                <div class="w-full flex justify-between items-center mb-4">
                    <p class="text-white/90 text-sm font-medium text-left">Доступно<br>цього місяця</p>
                </div>
                <h2 class="text-4xl font-bold mb-8 w-full text-left" id="total-balance">₴0</h2>
                
                <!-- SVG Кільце прогресу -->
                <div class="relative w-32 h-32 flex items-center justify-center">
                    <svg class="absolute inset-0 w-full h-full" viewBox="0 0 100 100">
                        <circle class="text-white/20 stroke-current" stroke-width="8" cx="50" cy="50" r="40" fill="transparent"></circle>
                        <circle id="balance-ring" class="text-white progress-ring__circle stroke-current" stroke-width="8" stroke-linecap="round" cx="50" cy="50" r="40" fill="transparent" stroke-dasharray="251.2" stroke-dashoffset="251.2"></circle>
                    </svg>
                    <div class="absolute flex flex-col items-center">
                        <span id="balance-percent" class="text-2xl font-bold">0%</span>
                    </div>
                </div>
            </div>

            <!-- 4. Форма додавання (Біла картка) -->
            <div class="bento-card md:col-span-8 bg-white p-8 flex flex-col justify-center">
                <h3 class="font-bold text-lg mb-6 text-slate-800">Додати нову транзакцію</h3>
                
                <form id="transaction-form" class="flex flex-col sm:flex-row gap-4 w-full">
                    <div class="flex-1 relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-tag text-slate-400"></i>
                        </div>
                        <input type="text" id="t-name" placeholder="Назва (напр. Сільпо)" class="w-full pl-11 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-green-brand text-sm font-medium transition-shadow" required>
                    </div>
                    
                    <div class="w-full sm:w-40 relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-hryvnia text-slate-400"></i>
                        </div>
                        <input type="number" id="t-amount" placeholder="Сума" step="1" min="1" class="w-full pl-11 pr-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-green-brand text-sm font-medium transition-shadow" required>
                    </div>

                    <select id="t-category" class="w-full sm:w-48 px-4 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-green-brand text-sm font-medium cursor-pointer transition-shadow">
                        <optgroup label="Доходи">
                            <option value="income">💰 Дохід / Зарплата</option>
                        </optgroup>
                        <optgroup label="Витрати">
                            <option value="products" selected>🛒 Продукти</option>
                            <option value="transport">🚗 Транспорт</option>
                            <option value="entertainment">🎬 Розваги</option>
                            <option value="shopping">🛍️ Покупки</option>
                            <option value="other">📦 Інше</option>
                        </optgroup>
                    </select>

                    <button type="submit" class="bg-slate-800 hover:bg-slate-700 text-white font-bold py-4 px-8 rounded-2xl transition-transform hover:scale-105 active:scale-95 shadow-lg flex items-center justify-center gap-2 whitespace-nowrap">
                        <i class="fas fa-plus text-sm"></i> Додати
                    </button>
                </form>
            </div>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
