<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceBuddy | Статистика</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e5e5e5; }
        .bento-card { border-radius: 28px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .sidebar { background-color: #f8f9fa; border-top-right-radius: 40px; border-bottom-right-radius: 40px; }
        .bg-green-brand { background-color: #1a2e24; }
    </style>
</head>
<body class="flex min-h-screen text-slate-800 p-2 md:p-6 gap-6">

    <!-- Меню навігації -->
    <aside class="sidebar w-64 p-8 hidden lg:flex flex-col justify-between shadow-xl">
        <div>
            <div class="mb-12">
                <h1 class="text-2xl font-bold text-slate-800 mb-8"><i class="fas fa-wallet text-emerald-600 mr-2"></i>UPFinance</h1>
            </div>
            <nav class="space-y-2">
                <!-- Перехід на головну -->
                <a href="index.html" class="flex items-center gap-4 px-5 py-3 rounded-2xl font-medium text-slate-500 hover:bg-slate-100"><i class="fas fa-home w-5"></i> Головна</a>
                <!-- Активна вкладка (Статистика) -->
                <a href="statistics.html" class="flex items-center gap-4 bg-green-brand text-white px-5 py-3 rounded-2xl font-medium"><i class="fas fa-chart-pie w-5"></i> Статистика</a>
            </nav>
        </div>
    </aside>

    <!-- Робоча область статистики -->
    <main class="flex-1 max-w-6xl mx-auto w-full flex flex-col gap-6">
        <div class="bento-card w-full h-[500px] bg-green-brand p-10 text-white flex flex-col">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h2 class="text-3xl font-bold">Аналітика витрат</h2>
                    <p class="text-emerald-400">Розподіл по категоріях</p>
                </div>
                <div class="text-right">
                    <p class="text-emerald-400 mb-1">Загальні витрати</p>
                    <h3 class="text-4xl font-bold" id="total-expense-stat">₴0</h3>
                </div>
            </div>
            
            <div class="flex-1 relative w-full">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>
    </main>

    <!-- Підключаємо той самий спільний файл логіки -->
    <script src="app.js"></script>
</body>
</html>
